name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint check
        run: |
          # Basic syntax check on all JS files
          find src bin -name '*.js' -exec node --check {} \;

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aether:latest .

      - name: Test Docker health
        run: |
          docker run -d --name aether-test \
            -e ANTHROPIC_API_KEY=sk-ant-test \
            -p 18789:18789 \
            aether:latest
          sleep 5
          # Gateway won't fully start without real API key, but image should build
          docker stop aether-test
          docker rm aether-test
